workflows:
  songify-android:
    name: SongIfy Android Build

    max_build_duration: 120

    environment:
      java: 17

      vars:
        GRADLE_OPTS: "-Xmx4096m"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:

      - name: Set permissions
        script: |
          chmod +x gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Release APK
        script: |
          ./gradlew assembleRelease

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
      - app/build/reports/**/problems-report.html

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
        notify:
          success: true
          failure: true
