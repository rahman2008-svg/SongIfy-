workflows:
  songify-android:
    name: SongIfy Android Build

    max_build_duration: 120

    environment:
      java: 17

      vars:
        GRADLE_OPTS: "-Xmx4096m"

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:

      - name: Show environment
        script: |
          java -version
          ./gradlew --version

      - name: Grant permissions
        script: |
          chmod +x gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK (SAFE INSTALL)
        script: |
          ./gradlew assembleDebug

      - name: Build Release APK (SIGNED IF AVAILABLE)
        script: |
          ./gradlew assembleRelease

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/apk/debug/**/*.apk
      - app/build/outputs/apk/release/**/*.apk
      - app/build/outputs/bundle/release/**/*.aab
      - app/build/reports/**/problems-report.html

    publishing:
      email:
        recipients:
          - prince.ar.abdur.rahman2008@gmail.com
        notify:
          success: true
          failure: true
